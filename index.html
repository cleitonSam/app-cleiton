<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0C1A33" />

    <title>Linha — copiloto de rotina</title>
    <meta name="description" content="Seu copiloto diário para evoluir e vencer barreiras." />

    <!-- App privado, atrás de login. Não há motivo pra tela de entrada
         (nem o nome de quem usa) aparecer numa busca do Google. -->
    <meta name="robots" content="noindex, nofollow" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Linha" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      html, body { margin: 0; background: #E9EFFB; }
      /* Sai assim que o React monta. Se o bundle quebrar, é isto que a pessoa vê
         no lugar de uma tela branca sem explicação nenhuma. */
      .carregando { padding: 40px 24px; font: 15px/1.6 Inter, system-ui, sans-serif; color: #5A6B87; text-align: center; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="carregando">
        <p>Abrindo o Linha…</p>
        <p style="font-size:13px">Se esta tela não sair em alguns segundos, recarregue a página.</p>
      </div>
    </div>

    <noscript>
      <div class="carregando">
        <p><strong>O Linha precisa de JavaScript pra funcionar.</strong></p>
        <p>Habilite o JavaScript no navegador e recarregue a página.</p>
      </div>
    </noscript>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
